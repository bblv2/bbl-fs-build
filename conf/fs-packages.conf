# Curated FreeSWITCH apt package set for BBL.
#
# Derived from BBL modules.conf.xml (which modules actually load on
# fs-atl). Intentionally NOT installing freeswitch-meta-all (which
# pulls 60+ packages including video, mariadb, java/v8 bindings, etc.
# that BBL has never used).
#
# Source: SignalWire-hosted apt repo, debian/bookworm channel.
#
# One package per line. Comments allowed. Blank lines ignored.

# ── Core ──
freeswitch
freeswitch-mod-commands
freeswitch-mod-console
freeswitch-mod-logfile
freeswitch-mod-loopback
freeswitch-mod-dptools
freeswitch-mod-expr
freeswitch-mod-hash

# ── Signaling ──
freeswitch-mod-sofia
freeswitch-mod-rtc
freeswitch-mod-event-socket
freeswitch-mod-dialplan-xml

# ── Conferencing (THE critical module for BBL) ──
freeswitch-mod-conference

# ── CDR / logging ──
freeswitch-mod-cdr-csv
freeswitch-mod-format-cdr

# ── HTTP / Backend integration ──
freeswitch-mod-curl
freeswitch-mod-http-cache

# ── Audio processing ──
freeswitch-mod-spandsp
freeswitch-mod-tone-stream

# ── Codecs ──
freeswitch-mod-amr
freeswitch-mod-b64
freeswitch-mod-bcg729
freeswitch-mod-g723-1
freeswitch-mod-opus

# ── File formats ──
freeswitch-mod-native-file
freeswitch-mod-png
freeswitch-mod-shout
freeswitch-mod-sndfile

# ── Languages / scripts ──
freeswitch-mod-lua
freeswitch-mod-flite
freeswitch-mod-say-en

# ── Sounds (US English only — 8/16 kHz; drop multi-language packs) ──
freeswitch-sounds-en-us-callie
