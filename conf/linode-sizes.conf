# Size profiles for bbl-fs-build. Maps friendly names → Linode SKU.
# Choose by expected workload + budget; the build is otherwise identical
# across all sizes.

# size_name  linode_sku        cores   ram_gb  monthly
small        g6-standard-2     2       4       24
medium       g6-dedicated-4    4       8       72
large        g6-dedicated-8    8       16      144
xlarge       g6-dedicated-16   16      32      288
