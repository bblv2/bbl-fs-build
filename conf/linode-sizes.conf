# Size profiles for bbl-fs-build. Maps friendly names → Linode SKU.
#
# Capacity numbers are based on empirical load testing (see overnight
# battery results 2026-05-01) where fs-atl-class (g6-dedicated-8) handled
# 600 simultaneous active callers cleanly with egress shaving beginning
# at 720+. Smaller plans extrapolated from CPU-per-caller scaling.
#
# Updated: 2026-05-01. Re-validate against the regression suite + load
# battery whenever Linode introduces new SKUs or you bump FS versions.

# size_name  linode_sku        cores   ram_gb  monthly  est_concurrent_callers  notes
small        g6-standard-2     2       4       24       50                      dev/staging only
medium       g6-dedicated-4    4       8       72       200                     mid-size prod
large        g6-dedicated-8    8       16      144      600                     full prod (proven by fs-atl)
xlarge       g6-dedicated-16   16      32      288      1200                    headroom / future-prod
