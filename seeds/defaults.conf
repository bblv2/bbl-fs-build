# bbl-fs-build — non-secret cluster defaults.
#
# Read by scripts/provision.sh FIRST when assembling the cloud-init
# host.conf for a new box. Subsequent overlays apply in order:
#   1. seeds/defaults.conf            (this file)              — VCS
#   2. seeds/hosts/<short>.conf       (optional, per-host)     — VCS
#   3. /etc/bbl-fs-secrets.conf       (shared secrets)         — loose on rpt
#   4. /etc/bbl-fs-secrets.d/<short>.conf  (optional per-host) — loose on rpt
#
# Last assignment of any variable wins. Anything operator-rotatable
# (SignalWire token, B2 app key, etc.) belongs in the secrets file,
# NOT here.
#
# register.py output (BBL_TELNYX_CONNECTION_ID, BBL_TEST_DID, etc.)
# is post-provision runtime state and gets appended to
# /etc/bbl-fs-host.conf on the running box. Not handled here.

# ── Public IPv4 (auto-detected on the new box; leave empty here) ─────
BBL_EXTERNAL_IP=

# ── Recordings ───────────────────────────────────────────────────────
BBL_B2_BUCKET=qc-recordings
BBL_REC_PATH=/opt/fs-qc-recordings

# ── ESL outbound endpoint ────────────────────────────────────────────
# Production / canary calls land on lb-atl. Beta boxes (fsb-atl*)
# override these in seeds/hosts/<short>.conf to point at lbb-atl.
BBL_ESL_OUTBOUND_IP=50.116.36.14
BBL_ESL_OUTBOUND=50.116.36.14:8085

# ── Monitoring / TLS ─────────────────────────────────────────────────
BBL_HEP_TARGET=172.105.152.19:9060
BBL_CERT_EMAIL=admin@brandedbridgeline.com

# ── bbl-fs-config source ─────────────────────────────────────────────
BBL_CONFIG_REPO=git@github.com:bblv2/bbl-fs-config.git
BBL_CONFIG_BRANCH=main
