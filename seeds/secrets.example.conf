# bbl-fs-build — secrets template. Copy to /etc/bbl-fs-secrets.conf
# (mode 0600) on rpt and fill in real values.
#
# This file is the ONLY rpt-side loose file the provisioner reads
# (apart from optional /etc/bbl-fs-secrets.d/<short>.conf for per-host
# secret overrides). Back it up to your password vault.
#
# Anything non-secret belongs in seeds/defaults.conf or
# seeds/hosts/<short>.conf, NOT here.

# SignalWire FreeSWITCH apt repo token.
# https://signalwire.com/ → Personal Access Token. Free tier is fine.
BBL_SIGNALWIRE_TOKEN=

# Backblaze B2 credentials for nightly recording archive.
# Generate per-bucket scoped keys at https://secure.backblaze.com/app_keys.htm
# Required perms: listFiles, readFiles, writeFiles on BBL_B2_BUCKET
# (defined in seeds/defaults.conf).
BBL_B2_KEY_ID=
BBL_B2_APP_KEY=

# bbl-monitor ingest token. Optional override — if blank, provisioning
# uses the compiled-in default that matches the deployed ingest endpoint.
BBL_MONITOR_TOKEN=
